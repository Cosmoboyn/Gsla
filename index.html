<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GsLa - Официальный сайт тестов</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #c3b1e1;
            overflow-x: hidden;
        }

        /* --- ЭКРАН ПАРОЛЯ --- */
        #password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #c3b1e1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-box h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 15px;
            border: 2px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .login-box button {
            background-color: #e6e600;
            color: #009966;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
        }

        .error-msg {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #main-content {
            display: none;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            width: 100%;
        }

        .top-banner {
            background-color: #e6e600;
            color: #009966;
            text-align: center;
            padding: 20px 10px;
            font-size: 70px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .sub-banner {
            background-color: #8ce6f0;
            color: #009966;
            text-align: center;
            padding: 12px 10px;
            font-size: 28px;
            border-bottom: 4px solid #ba55d3;
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px 60px;
            align-content: start;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 26px;
            color: #009966;
            height: 60px;
            border-radius: 30px;
            font-weight: 500;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-link:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-yellow { background-color: #e6e600; }
        .btn-blue { background-color: #8ce6f0; }

        footer {
            text-align: center;
            padding: 20px;
            color: #009966;
            font-size: 16px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; gap: 20px; }
            .top-banner { font-size: 45px; }
            .sub-banner { font-size: 20px; }
            .btn-link { font-size: 20px; height: 50px; }
        }
    </style>
</head>
<body>

    <div id="password-screen">
        <div class="login-box">
            <h2>Доступ ограничен</h2>
            <input type="password" id="password-input" placeholder="Введите пароль" onkeydown="if(event.key === 'Enter') checkPassword()">
            <button onclick="checkPassword()">Войти</button>
            <p class="error-msg" id="error-message">Неверный пароль. Попробуйте еще раз!</p>
        </div>
    </div>

    <div id="main-content">
        
        <header>
            <div class="top-banner">GsLa</div>
            <div class="sub-banner">Официальный сайт тестов</div>
        </header>

        <main class="container">
            
            <a href="https://cosmoboyn.github.io/Earth/" class="btn-link btn-yellow">Earth</a>

            <a href="https://cosmoboyn.github.io/among-us-/" class="btn-link btn-blue">Among Us </a>


            <a href="https://cosmoboyn.github.io/geometry-dash-parody/" class="btn-link btn-yellow">Geometry Dash</a>

            <a href="https://cosmoboyn.github.io/space-game/" class="btn-link btn-blue">Неудачная игра</a>


            <a href="https://cosmoboyn.github.io/gemeni-ai-os/" class="btn-link btn-yellow">Gemeni OS</a>

            <a href="https://cosmoboyn.github.io/bs-chess/" class="btn-link btn-blue">Chess</a>

            </main>

        <footer>
            2026© GSLA Corporation
        </footer>

    </div>

    <script>
        function checkPassword() {
            const passwordInput = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-message');
            const passwordScreen = document.getElementById('password-screen');
            const mainContent = document.getElementById('main-content');

            if (passwordInput === "GSuperman") {
                passwordScreen.style.opacity = '0';
                setTimeout(() => {
                    passwordScreen.style.display = 'none';
                    mainContent.style.display = 'flex';
                }, 500);
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('password-input').value = '';
            }
        }
    </script>

</body>
</html>
